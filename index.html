<!DOCTYPE html>
<html lang="en" data-theme="ink">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atlas · Personal Learning Codex</title>
  <meta name="description" content="A personal, gamified learning codex for linear algebra, calculus, algorithms, deep learning, reinforcement learning, and LLMs." />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#141110" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Atlas" />

  <!-- KaTeX for math typesetting -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous" />
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <button class="skip-link" id="skip-link">Skip to content</button>
  <div class="shell">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" aria-label="Sidebar">
      <div class="brand" onclick="location.hash='#/'">
        <div class="glyph">A</div>
        <div>
          <h1>Atlas</h1>
          <div class="sub">Learning Codex</div>
        </div>
      </div>

      <nav class="nav" aria-label="Main navigation">
        <a href="#/" data-route><span class="i" aria-hidden="true">⌂</span> Dashboard</a>
        <a href="#/review" data-route><span class="i">⚡</span> Daily Review</a>
        <a href="#/test" data-route><span class="i">📝</span> Spawn a Test</a>
        <a href="#/lab" data-route><span class="i">🎛️</span> Visualization Lab</a>
        <a href="#/map" data-route><span class="i">🗺️</span> Knowledge Map</a>
        <a href="#/playground" data-route><span class="i">💻</span> Code Playground</a>
        <a href="#/glossary" data-route><span class="i" aria-hidden="true">📔</span> Glossary</a>
        <a href="#/library" data-route><span class="i" aria-hidden="true">📚</span> Library</a>
        <a href="#/achievements" data-route><span class="i">🏆</span> Achievements</a>
        <a href="#/stats" data-route><span class="i">📊</span> Progress</a>
      </nav>

      <div class="nav nav-courses">
        <div class="nav-label">Topics</div>
        <div id="nav-courses"></div>
      </div>

      <div class="side-foot">
        <button class="theme-toggle" id="guide-btn">❔ Guide / tour</button>
        <button class="theme-toggle" id="search-btn">🔎 Search <span style="margin-left:auto;opacity:.6;font-family:monospace">⌘K</span></button>
        <button class="theme-toggle" id="theme-toggle">☾ Ink theme</button>
        <span>Built for focused, lifelong study.</span>
      </div>
    </aside>

    <!-- Main -->
    <div class="main">
      <header class="topbar">
        <button class="menu-btn" id="menu-btn" aria-label="Open menu" aria-controls="sidebar">☰</button>
        <div class="level-badge">
          <div class="level-ring" id="ring"><span id="ring-num">1</span></div>
          <div class="level-meta">
            <div class="t" id="lvl-name">Novice</div>
            <div class="s" id="lvl-sub">Level 1</div>
          </div>
        </div>
        <div class="xp-wrap">
          <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
          <div class="xp-text" id="xp-text">0 XP</div>
        </div>
        <div class="streak">
          <span class="flame">🔥</span>
          <span class="num" id="streak-num">0</span>
          <span class="lbl">day<br>streak</span>
        </div>
      </header>

      <main id="app" tabindex="-1" aria-label="Main content"></main>
    </div>
  </div>

  <!-- data + logic (classic scripts, order matters; work on file:// and Pages) -->
  <script src="data/linear-algebra.js"></script>
  <script src="data/calculus.js"></script>
  <script src="data/algorithms.js"></script>
  <script src="data/deep-learning.js"></script>
  <script src="data/reinforcement-learning.js"></script>
  <script src="data/llm.js"></script>
  <script src="data/prereqs.js"></script>
  <script src="data/references.js"></script>
  <script src="data/glossary.js"></script>
  <script src="js/viz.js"></script>
  <script src="js/playground.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>

  <!-- PWA: offline app shell + graceful update prompt (only over http/https; no-op on file://) -->
  <script>
    if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").then(function (reg) {
          function promptUpdate(worker) {
            if (document.getElementById("sw-update")) return;
            var b = document.createElement("div");
            b.id = "sw-update";
            b.style.cssText = "position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:400;background:#211c19;color:#f1e8da;border:1px solid #c8853a;border-radius:12px;padding:12px 16px;font-family:Spectral,Georgia,serif;font-size:14px;box-shadow:0 16px 44px rgba(0,0,0,.5);display:flex;gap:14px;align-items:center";
            b.innerHTML = "✨ A new version of Atlas is available. <button id='sw-refresh' style='background:#e0a458;color:#2a1c08;border:none;border-radius:8px;padding:6px 14px;font-weight:600;cursor:pointer'>Refresh</button>";
            document.body.appendChild(b);
            document.getElementById("sw-refresh").onclick = function () { worker.postMessage({ type: "SKIP_WAITING" }); b.remove(); };
          }
          if (reg.waiting && navigator.serviceWorker.controller) promptUpdate(reg.waiting);
          reg.addEventListener("updatefound", function () {
            var nw = reg.installing;
            if (nw) nw.addEventListener("statechange", function () { if (nw.state === "installed" && navigator.serviceWorker.controller) promptUpdate(nw); });
          });
        }).catch(function () {});
        var reloaded = false;
        navigator.serviceWorker.addEventListener("controllerchange", function () { if (reloaded) return; reloaded = true; location.reload(); });
      });
    }
  </script>
</body>
</html>
