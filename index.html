  <!-- Pre-hydrate the whole header badge from saved state at parse time, so it never flashes the misleading
       defaults (Level 1 · Novice · 0 XP · "0 day streak" with an inert flame) before the deferred data/app
       scripts run. renderChrome() keeps it in sync afterward (incl. today's streak tick-up). Falls back
       silently to the hardcoded defaults on any error. The LEVELS curve + flame tiers mirror store.js/app.js;
       a drift would only affect this one pre-paint frame (renderChrome corrects it immediately after). -->
  <script>
    (function () {
      try {
        var s = JSON.parse(localStorage.getItem("atlas.v1") || "{}");
        var set = function (id, v) { var e = document.getElementById(id); if (e) e.textContent = v; };
        // streak number + flame intensity tier — show the EFFECTIVE streak (mirror store.js touchStreak's
        // day-diff logic) so the first paint matches what the app computes a moment later. Without this,
        // reopening after a missed day briefly flashed the stale, now-broken streak (e.g. "30" with a blazing
        // flame) before it collapsed to 1 once the deferred ~6MB scripts booted. renderChrome re-syncs after.
        var n = (function () {
          var saved = (s && Number.isFinite(s.streak)) ? s.streak : 0;
          var fz = (s && Number.isFinite(s.freezes)) ? s.freezes : 0;
          var la = s && s.lastActive;
          if (!la) return saved > 0 ? saved : 1;       // brand-new/first open → touchStreak counts today
          var d = new Date(), today = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
          if (la === today) return saved;              // already counted today → unchanged
          var diff = Math.round((new Date(today + "T00:00:00") - new Date(la + "T00:00:00")) / 86400000);
          if (diff === 1) return saved + 1;            // consecutive day → ticks up
          if (diff === 2 && fz > 0) return saved + 1;  // a freeze will cover the 1-day gap
          return 1;                                    // missed >1 day (or no freeze) → resets
        })();
        set("streak-num", n);
        var f = document.querySelector(".streak .flame");
        if (f) {
          var tier = n <= 0 ? "unlit" : n < 7 ? "lit" : n < 30 ? "hot" : n < 100 ? "blazing" : "inferno";
          f.classList.add("flame-" + tier); f.dataset.tier = tier;
        }
        // level ring + XP bar (LEVELS mirrors store.js)
        var xp = (s && Number.isFinite(s.xp)) ? s.xp : 0;
        var L = [[0, "Novice"], [150, "Apprentice"], [400, "Student"], [800, "Scholar"], [1400, "Adept"], [2200, "Savant"], [3200, "Sage"], [4500, "Master"], [6200, "Luminary"], [8500, "Polymath"]];
        var idx = 0; for (var i = 0; i < L.length; i++) if (xp >= L[i][0]) idx = i;
        var level = idx + 1, name = L[idx][1], next = L[idx + 1] || null;
        var span = next ? next[0] - L[idx][0] : 1, pct = next ? Math.min(100, Math.round((xp - L[idx][0]) / span * 100)) : 100;
        set("ring-num", level); set("lvl-name", name); set("lvl-sub", "Level " + level);
        var ring = document.getElementById("ring"); if (ring) ring.style.setProperty("--ring", pct + "%");
        var xf = document.getElementById("xp-fill"); if (xf) xf.style.width = pct + "%";
        set("xp-text", next ? (xp.toLocaleString() + " XP · " + (next[0] - xp).toLocaleString() + " to " + next[1]) : (xp.toLocaleString() + " XP · max level"));
      } catch (e) {}
    })();
  </script>

  <!-- PWA: offline app shell + graceful update prompt (only over http/https; no-op on file://) -->
  <script>
    if ("serviceWorker" in navigator && location.protocol.indexOf("http") === 0) {
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("sw.js").then(function (reg) {
          function promptUpdate(worker) {
            if (document.getElementById("sw-update")) return;
            var b = document.createElement("div");
            b.id = "sw-update";
            b.style.cssText = "position:fixed;bottom:22px;left:50%;transform:translateX(-50%);z-index:400;background:#211c19;color:#f1e8da;border:1px solid #c8853a;border-radius:12px;padding:12px 16px;font-family:Spectral,Georgia,serif;font-size:14px;box-shadow:0 16px 44px rgba(0,0,0,.5);display:flex;gap:14px;align-items:center";
            b.innerHTML = "✨ A new version of Atlas is available. <button id='sw-refresh' style='background:#e0a458;color:#2a1c08;border:none;border-radius:8px;padding:6px 14px;font-weight:600;cursor:pointer'>Refresh</button>";
            document.body.appendChild(b);
            document.getElementById("sw-refresh").onclick = function () { worker.postMessage({ type: "SKIP_WAITING" }); b.remove(); };
          }
          if (reg.waiting && navigator.serviceWorker.controller) promptUpdate(reg.waiting);
          reg.addEventListener("updatefound", function () {
            var nw = reg.installing;
            if (nw) nw.addEventListener("statechange", function () { if (nw.state === "installed" && navigator.serviceWorker.controller) promptUpdate(nw); });
          });
        }).catch(function () {});
        var reloaded = false;
        navigator.serviceWorker.addEventListener("controllerchange", function () { if (reloaded) return; reloaded = true; location.reload(); });
      });
    }
  </script>

  <!-- Privacy-friendly analytics (GoatCounter): cookieless, no consent banner needed.
       SETUP: register a free site at https://www.goatcounter.com/ then replace ATLAS_GC_CODE
       below with your site code (the "<code>" in https://<code>.goatcounter.com). Until then this
       is a no-op. SPA-aware: each hash route (#/lesson/...) is counted as its own pageview, and
       localhost/file:// are excluded so dev clicks never pollute the stats. -->
  <script>
    (function () {
      var GC_CODE = "vspinftu"; // goatcounter site code
      var host = location.hostname;
      var isLocal = host === "localhost" || host === "127.0.0.1" || host === "" || location.protocol === "file:";
      if (GC_CODE === "ATLAS_GC_CODE" || isLocal) return; // not configured, or running locally → skip

      // count the full SPA path (pathname + hash) so each lesson/route is a distinct page
      window.goatcounter = { path: function () { return location.pathname + (location.hash || ""); } };

      var s = document.createElement("script");
      s.async = true;
      s.src = "//gc.zgo.at/count.js";
      s.setAttribute("data-goatcounter", "https://" + GC_CODE + ".goatcounter.com/count");
      document.head.appendChild(s);

      // GoatCounter auto-counts the first load; we count every subsequent hash navigation.
      window.addEventListener("hashchange", function () {
        if (window.goatcounter && window.goatcounter.count) {
          window.goatcounter.count({ path: location.pathname + (location.hash || "") });
        }
      });
    })();
  </script>
